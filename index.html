<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>サッカー戦術ボード</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="戦術ボード">
<meta name="theme-color" content="#15181a">

<style>
  :root{
    --bg:#15181a;
    --panel:#1f2427;
    --panel2:#262c30;
    --line:#3a4247;
    --ink:#eef1f0;
    --sub:#9aa6a9;
    --accent:#e8b93a;
    --blue:#3b78c9;
    --red:#d74b42;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    min-height:100%;overflow-x:hidden;
  }

  body{
    display:block;min-height:100svh;height:auto;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:calc(env(safe-area-inset-top) + 8px) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 18px) env(safe-area-inset-left);
  }

  header{padding:8px 10px 4px;}
  h1{margin:0 0 8px;font-size:15px;font-weight:800;letter-spacing:.06em;border-left:4px solid var(--accent);padding-left:8px;}
  .row{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center;}
  .seg{display:flex;background:var(--panel2);border-radius:12px;padding:3px;gap:3px;}
  .seg button{border:none;background:transparent;color:var(--sub);padding:8px 12px;border-radius:9px;font-size:13px;font-weight:800;}
  .seg button.active{background:var(--accent);color:#20240a;}
  .presetChip{display:flex;align-items:center;gap:5px;flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px 7px;}
  .presetChip .tag{font-size:10px;font-weight:800;color:var(--sub);white-space:nowrap;}
  select{flex:1;min-width:0;background:transparent;color:var(--ink);border:none;font-size:13px;font-weight:800;outline:none;padding:6px 2px;}
  .tools{display:flex;gap:6px;flex:1;flex-wrap:wrap;}
  .tools button{flex:1 1 68px;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:10px;padding:9px 4px;font-size:12px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .tools button .ic{font-size:18px;line-height:1;}
  .tools button.active{border-color:var(--accent);background:#332c14;color:var(--accent);}
  .actions{display:flex;gap:6px;flex-wrap:wrap;}
  .actions button{border:1px solid var(--line);background:var(--panel);color:var(--sub);border-radius:10px;padding:8px 11px;font-size:12px;font-weight:800;}
  .swatches{display:flex;gap:8px;align-items:center;}
  .swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;padding:0;}
  .swatch.selected{border-color:var(--accent);box-shadow:0 0 0 2px #0005;}
  .teamrow{display:flex;gap:8px;align-items:center;}
  .teamchip{display:flex;align-items:center;gap:7px;flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;}
  .teamchip input{flex:1;min-width:0;background:transparent;border:none;color:var(--ink);font-size:14px;font-weight:800;outline:none;}
  main{display:flex;justify-content:center;align-items:flex-start;padding:4px 8px 18px;overflow:visible;}
  #pitchWrap{position:relative;width:100%;max-width:540px;background:#2e7d4f;border-radius:10px;overflow:hidden;box-shadow:0 0 0 1px #0007,0 8px 24px #0007;touch-action:none;margin-bottom:14px;}
  #pitchWrap svg,#pitchWrap canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #pitchSvg{z-index:1;pointer-events:none;}
  #drawLayer{z-index:2;}
  #tokens{position:absolute;inset:0;width:100%;height:100%;z-index:3;}
  .token{position:absolute;transform:translate(-50%,-50%);width:8.2%;aspect-ratio:1/1;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 5px #0008;user-select:none;touch-action:none;text-align:center;line-height:1;overflow:visible;padding:1px;}
  .token .tokenLabel{position:relative;z-index:2;max-width:92%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .token .faceTip{position:absolute;left:50%;top:50%;width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid rgba(255,255,255,.95);transform:translate(-50%,-50%) rotate(var(--angle,0deg)) translateY(-230%);transform-origin:50% 50%;z-index:4;filter:drop-shadow(0 1px 2px rgba(0,0,0,.65));pointer-events:none;}
  .token.blue{background:var(--blue);}
  .token.red{background:var(--red);}
  .token.gk{background:#242424;border-color:var(--accent);}
  .token.ball{width:5%;background:radial-gradient(circle at 35% 30%,#fff,#ddd 55%,#999);border:2px solid #444;color:transparent;overflow:hidden;}
  .overlayInput{position:absolute;z-index:6;transform:translate(-50%,-50%);background:#000e;color:#fff;border:1px solid var(--accent);border-radius:7px;padding:6px 8px;font-size:15px;font-weight:700;min-width:80px;max-width:80%;}
  footer{padding:0 12px calc(18px + env(safe-area-inset-bottom));color:var(--sub);font-size:11px;text-align:center;}
</style>
</head>

<body>
<header>
  <h1>サッカー戦術ボード</h1>
  <div class="row"><div class="seg" id="modeSeg"><button data-mode="full" class="active">フルコート</button><button data-mode="half">ハーフコート</button></div></div>
  <div class="row" id="fullPresetRow"><div class="presetChip"><span class="tag">ホーム</span><select id="homeFormationSelect"></select></div><div class="presetChip"><span class="tag">アウェイ</span><select id="awayFormationSelect"></select></div></div>
  <div class="row" id="halfPresetRow" style="display:none;"><div class="presetChip" style="flex:1;"><span class="tag">シーン</span><select id="halfScenarioSelect"></select></div></div>
  <div class="row"><div class="tools" id="toolRow"><button data-tool="move" class="active"><span class="ic">✋</span>移動</button><button data-tool="rotate"><span class="ic">↻</span>回転</button><button data-tool="arrow"><span class="ic">➤</span>矢印</button><button data-tool="pen"><span class="ic">✎</span>ペン</button><button data-tool="eraser"><span class="ic">⌫</span>消しゴム</button><button data-tool="text"><span class="ic">A</span>メモ</button></div></div>
  <div class="row"><div class="swatches" id="swatchRow"><button class="swatch selected" style="background:#ffffff" data-color="#ffffff"></button><button class="swatch" style="background:#f4d13a" data-color="#f4d13a"></button><button class="swatch" style="background:#3ad1e0" data-color="#3ad1e0"></button><button class="swatch" style="background:#111111" data-color="#111111"></button></div><div class="seg" id="dashSeg"><button data-dash="solid" class="active">パス<br>実線</button><button data-dash="dash">走る<br>破線</button></div><div class="actions" style="margin-left:auto;"><button id="undoBtn">戻す</button><button id="clearBtn">描画消去</button></div></div>
  <div class="row"><div class="actions" style="flex:1;"><button id="resetBtn" style="flex:1;">配置リセット</button><button id="flipBtn" style="flex:1;">反転</button></div></div>
  <div class="row teamrow"><div class="teamchip"><span class="dot" style="background:var(--blue)"></span><input id="blueLabelInput" maxlength="16" value="BLUE"></div><div class="teamchip"><span class="dot" style="background:var(--red)"></span><input id="redLabelInput" maxlength="16" value="RED"></div></div>
</header>

<main><div id="pitchWrap"><svg id="pitchSvg"></svg><canvas id="drawLayer"></canvas><div id="tokens"></div></div></main>
<footer>配置・描画・チーム名・顔向きは自動保存されます。消しゴムは描いた線・矢印・メモをタップ/なぞって削除できます。</footer>

<script>
(function(){
  const W=68,H_FULL=105,H_HALF=52.5,STORAGE_KEY="soccerTacticsBoardState_v6";
  function copy(obj){return JSON.parse(JSON.stringify(obj));}
  const FULL_FORMATIONS={
    "4-4-2":[{n:1,x:34,y:100},{n:2,x:58,y:85},{n:3,x:43,y:88},{n:4,x:25,y:88},{n:5,x:10,y:85},{n:6,x:56,y:68},{n:7,x:40,y:70},{n:8,x:28,y:70},{n:9,x:12,y:68},{n:10,x:42,y:55},{n:11,x:26,y:55}],
    "4-3-3":[{n:1,x:34,y:100},{n:2,x:56,y:85},{n:3,x:43,y:88},{n:4,x:25,y:88},{n:5,x:10,y:85},{n:6,x:52,y:68},{n:7,x:34,y:70},{n:8,x:16,y:68},{n:9,x:54,y:54},{n:10,x:34,y:56},{n:11,x:14,y:54}],
    "3-5-2":[{n:1,x:34,y:100},{n:2,x:48,y:88},{n:3,x:34,y:90},{n:4,x:20,y:88},{n:5,x:58,y:70},{n:6,x:44,y:72},{n:7,x:34,y:68},{n:8,x:24,y:72},{n:9,x:10,y:70},{n:10,x:40,y:55},{n:11,x:28,y:55}],
    "4-2-3-1":[{n:1,x:34,y:100},{n:2,x:58,y:85},{n:3,x:43,y:88},{n:4,x:25,y:88},{n:5,x:10,y:85},{n:6,x:42,y:74},{n:7,x:26,y:74},{n:8,x:54,y:60},{n:9,x:34,y:62},{n:10,x:14,y:60},{n:11,x:34,y:52}],
    "4-1-4-1":[{n:1,x:34,y:100},{n:2,x:58,y:85},{n:3,x:43,y:88},{n:4,x:25,y:88},{n:5,x:10,y:85},{n:6,x:34,y:74},{n:7,x:56,y:62},{n:8,x:42,y:64},{n:9,x:26,y:64},{n:10,x:12,y:62},{n:11,x:34,y:52}],

    "4-5-1":[{n:1,x:34,y:100},{n:2,x:58,y:85},{n:3,x:43,y:88},{n:4,x:25,y:88},{n:5,x:10,y:85},{n:6,x:58,y:66},{n:7,x:46,y:70},{n:8,x:34,y:68},{n:9,x:22,y:70},{n:10,x:10,y:66},{n:11,x:34,y:52}],
    "5-3-2":[{n:1,x:34,y:100},{n:2,x:60,y:84},{n:3,x:48,y:88},{n:4,x:34,y:90},{n:5,x:20,y:88},{n:6,x:8,y:84},{n:7,x:46,y:70},{n:8,x:34,y:68},{n:9,x:22,y:70},{n:10,x:42,y:54},{n:11,x:26,y:54}]
  };
  const FULL_FORMATION_NAMES={"4-4-2":"4-4-2","4-3-3":"4-3-3","3-5-2":"3-5-2","4-2-3-1":"4-2-3-1","4-1-4-1":"4-1-4-1","3-4-3":"3-4-3","4-5-1":"4-5-1","5-3-2":"5-3-2"};
  const HALF_SCENARIOS={
    corner:{blue:[{n:1,x:34,y:3,gk:true},{n:2,x:28,y:8},{n:3,x:34,y:8},{n:4,x:40,y:8},{n:5,x:24,y:12},{n:6,x:44,y:12},{n:7,x:30,y:16},{n:8,x:38,y:16},{n:9,x:20,y:18},{n:10,x:48,y:18},{n:11,x:34,y:23}],red:[{n:1,x:66,y:2},{n:2,x:26,y:10},{n:3,x:34,y:10},{n:4,x:42,y:10},{n:5,x:30,y:14},{n:6,x:38,y:14},{n:7,x:22,y:18},{n:8,x:46,y:18},{n:9,x:34,y:30},{n:10,x:20,y:32},{n:11,x:48,y:32}],ball:{x:66,y:1}},
    freekick:{blue:[{n:1,x:26,y:3,gk:true},{n:2,x:30,y:14},{n:3,x:33,y:14},{n:4,x:36,y:14},{n:5,x:39,y:14},{n:6,x:24,y:10},{n:7,x:44,y:10},{n:8,x:34,y:9},{n:9,x:20,y:20},{n:10,x:48,y:20},{n:11,x:34,y:24}],red:[{n:1,x:34,y:22},{n:2,x:26,y:11},{n:3,x:34,y:11},{n:4,x:42,y:11},{n:5,x:20,y:15},{n:6,x:48,y:15},{n:7,x:30,y:27},{n:8,x:38,y:27},{n:9,x:15,y:29},{n:10,x:53,y:29},{n:11,x:34,y:33}],ball:{x:34,y:22}}
  };
  const HALF_SCENARIO_NAMES={corner:"コーナーキック",freekick:"フリーキック"};
  function blueFromTemplate(name){const base=FULL_FORMATIONS[name]||FULL_FORMATIONS["4-3-3"];return base.map((p,i)=>({team:"blue",gk:i===0,n:p.n,label:String(p.n),x:p.x,y:p.y,angle:0}));}
  function redFromTemplate(name){const base=FULL_FORMATIONS[name]||FULL_FORMATIONS["4-3-3"];return base.map((p,i)=>({team:"red",gk:i===0,n:p.n,label:String(p.n),x:p.x,y:H_FULL-p.y,angle:180}));}
  function makeFullFormation(homeName,awayName){return{homePreset:homeName,awayPreset:awayName,players:blueFromTemplate(homeName).concat(redFromTemplate(awayName)),ball:{x:34,y:52.5},drawings:[]};}
  function makeHalfFormation(name){const s=HALF_SCENARIOS[name]||HALF_SCENARIOS.corner;const blue=s.blue.map(p=>({team:"blue",gk:!!p.gk,n:p.n,label:String(p.n),x:p.x,y:p.y,angle:p.angle ?? 180}));const red=s.red.map(p=>({team:"red",gk:!!p.gk,n:p.n,label:String(p.n),x:p.x,y:p.y,angle:p.angle ?? 0}));return{preset:name,players:blue.concat(red),ball:copy(s.ball),drawings:[]};}
  const state={mode:"full",tool:"move",color:"#ffffff",lineStyle:"solid",teamLabels:{blue:"BLUE",red:"RED"},full:makeFullFormation("4-3-3","4-3-3"),half:makeHalfFormation("corner")};
  function curH(){return state.mode==="full"?H_FULL:H_HALF;} function curState(){return state[state.mode];}
  function sanitizeState(){if(!state.full||!Array.isArray(state.full.players)||state.full.players.length<22)state.full=makeFullFormation("4-3-3","4-3-3");if(!state.half||!Array.isArray(state.half.players)||state.half.players.length<22)state.half=makeHalfFormation("corner");if(!state.full.homePreset||!FULL_FORMATIONS[state.full.homePreset])state.full.homePreset="4-3-3";if(!state.full.awayPreset||!FULL_FORMATIONS[state.full.awayPreset])state.full.awayPreset="4-3-3";if(!state.half.preset||!HALF_SCENARIOS[state.half.preset])state.half.preset="corner";if(!Array.isArray(state.full.drawings))state.full.drawings=[];if(!Array.isArray(state.half.drawings))state.half.drawings=[];if(!state.full.ball)state.full.ball={x:34,y:52.5};if(!state.half.ball)state.half.ball={x:66,y:1};if(!state.teamLabels)state.teamLabels={blue:"BLUE",red:"RED"};[state.full,state.half].forEach(st=>{if(st&&Array.isArray(st.players)){st.players.forEach(pl=>{if(typeof pl.angle!=="number")pl.angle=pl.team==="red"?180:0;});}});} 
  function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const obj=JSON.parse(raw);if(!obj)return;if(obj.mode)state.mode=obj.mode;if(obj.tool)state.tool=obj.tool;if(obj.color)state.color=obj.color;if(obj.lineStyle)state.lineStyle=obj.lineStyle;if(obj.teamLabels)state.teamLabels=obj.teamLabels;if(obj.full)state.full=obj.full;if(obj.half)state.half=obj.half;}catch(e){}}
  function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
  loadState();sanitizeState();state.tool="move";
  const pitchWrap=document.getElementById("pitchWrap"),svg=document.getElementById("pitchSvg"),canvas=document.getElementById("drawLayer"),ctx=canvas.getContext("2d"),tokensEl=document.getElementById("tokens"),homeFormationSelect=document.getElementById("homeFormationSelect"),awayFormationSelect=document.getElementById("awayFormationSelect"),halfScenarioSelect=document.getElementById("halfScenarioSelect"),fullPresetRow=document.getElementById("fullPresetRow"),halfPresetRow=document.getElementById("halfPresetRow");
  function fillSelect(sel,names,current){sel.innerHTML="";Object.keys(names).forEach(key=>{const opt=document.createElement("option");opt.value=key;opt.textContent=names[key];if(key===current)opt.selected=true;sel.appendChild(opt);});}
  function refreshPresetUI(){fillSelect(homeFormationSelect,FULL_FORMATION_NAMES,state.full.homePreset);fillSelect(awayFormationSelect,FULL_FORMATION_NAMES,state.full.awayPreset);fillSelect(halfScenarioSelect,HALF_SCENARIO_NAMES,state.half.preset);fullPresetRow.style.display=state.mode==="full"?"flex":"none";halfPresetRow.style.display=state.mode==="half"?"flex":"none";}
  homeFormationSelect.addEventListener("change",()=>{const name=homeFormationSelect.value;state.full.homePreset=name;state.full.players=blueFromTemplate(name).concat(state.full.players.filter(p=>p.team==="red"));renderTokens();saveState();});
  awayFormationSelect.addEventListener("change",()=>{const name=awayFormationSelect.value;state.full.awayPreset=name;state.full.players=state.full.players.filter(p=>p.team==="blue").concat(redFromTemplate(name));renderTokens();saveState();});
  halfScenarioSelect.addEventListener("change",()=>{state.half=makeHalfFormation(halfScenarioSelect.value);renderTokens();redrawCanvas();saveState();});
  function updatePitchHeight(){const h=curH();const w=pitchWrap.clientWidth||pitchWrap.getBoundingClientRect().width||320;pitchWrap.style.height=(w*h/W)+"px";}
  function buildPitchSVG(){const h=curH();svg.setAttribute("viewBox","0 0 "+W+" "+h);while(svg.firstChild)svg.removeChild(svg.firstChild);updatePitchHeight();const NS="http://www.w3.org/2000/svg";function add(name,attrs){const el=document.createElementNS(NS,name);Object.keys(attrs).forEach(k=>el.setAttribute(k,attrs[k]));svg.appendChild(el);return el;}const stripeCount=11;for(let i=0;i<stripeCount;i++)add("rect",{x:0,y:i*h/stripeCount,width:W,height:h/stripeCount,fill:i%2===0?"#2e7d4f":"#357f57"});const stroke="rgba(245,245,240,0.92)",lw="0.28";function line(x1,y1,x2,y2){add("line",{x1,y1,x2,y2,stroke,"stroke-width":lw});}function rect(x,y,width,height){add("rect",{x,y,width,height,fill:"none",stroke,"stroke-width":lw});}function circle(cx,cy,r){add("circle",{cx,cy,r,fill:"none",stroke,"stroke-width":lw});}function dot(cx,cy){add("circle",{cx,cy,r:0.35,fill:stroke});}function cornerArc(cx,cy,startAngle){const r=1,toRad=d=>d*Math.PI/180,x1=cx+r*Math.cos(toRad(startAngle)),y1=cy+r*Math.sin(toRad(startAngle)),x2=cx+r*Math.cos(toRad(startAngle+90)),y2=cy+r*Math.sin(toRad(startAngle+90));add("path",{d:"M "+x1+" "+y1+" A "+r+" "+r+" 0 0 1 "+x2+" "+y2,fill:"none",stroke,"stroke-width":lw});}rect(0,0,W,h);if(state.mode==="full"){line(0,52.5,W,52.5);circle(34,52.5,9.15);dot(34,52.5);}rect(13.84,0,40.32,16.5);rect(24.84,0,18.32,5.5);dot(34,11);rect(30.34,-2,7.32,2);cornerArc(0,0,0);cornerArc(W,0,90);if(state.mode==="full"){rect(13.84,h-16.5,40.32,16.5);rect(24.84,h-5.5,18.32,5.5);dot(34,h-11);rect(30.34,h,7.32,2);cornerArc(0,h,270);cornerArc(W,h,180);}}
  function adjustTokenFont(el,text){const len=String(text||"").length;el.style.fontSize=len<=2?"12px":len<=4?"10px":"8px";}
  function renderTokens(){tokensEl.innerHTML="";tokensEl.style.pointerEvents=(state.tool==="move"||state.tool==="rotate")?"auto":"none";const h=curH(),s=curState();s.players.forEach(p=>{const el=document.createElement("div");el.className="token "+(p.gk?"gk":p.team);el.style.left=(p.x/W*100)+"%";el.style.top=(p.y/h*100)+"%";el.style.setProperty("--angle",(p.angle||0)+"deg");const face=document.createElement("span");face.className="faceTip";const label=document.createElement("span");label.className="tokenLabel";label.textContent=p.label||String(p.n);el.appendChild(face);el.appendChild(label);adjustTokenFont(label,p.label||String(p.n));el.addEventListener("pointerdown",e=>startDragToken(e,p,el,true));tokensEl.appendChild(el);});const ball=document.createElement("div");ball.className="token ball";ball.style.left=(s.ball.x/W*100)+"%";ball.style.top=(s.ball.y/h*100)+"%";ball.addEventListener("pointerdown",e=>startDragToken(e,s.ball,ball,false));tokensEl.appendChild(ball);}
  function startDragToken(e,obj,el,canRename){if(state.tool==="rotate"&&canRename){e.preventDefault();e.stopPropagation();obj.angle=((obj.angle||0)+45)%360;renderTokens();saveState();return;}if(state.tool!=="move")return;e.preventDefault();e.stopPropagation();try{el.setPointerCapture(e.pointerId);}catch(err){}const h=curH(),startX=e.clientX,startY=e.clientY;let moved=false,longFired=false;const timer=canRename?setTimeout(()=>{if(!moved){longFired=true;openInlineInput(el,obj.label||String(obj.n),val=>{const v=val.trim();if(v)obj.label=v.slice(0,8);renderTokens();saveState();});}},600):null;function move(ev){const dx=ev.clientX-startX,dy=ev.clientY-startY;if(Math.hypot(dx,dy)>6)moved=true;if(longFired)return;if(moved&&timer)clearTimeout(timer);const rect=pitchWrap.getBoundingClientRect();let x=(ev.clientX-rect.left)/rect.width*W,y=(ev.clientY-rect.top)/rect.height*h;x=Math.max(0,Math.min(W,x));y=Math.max(0,Math.min(h,y));obj.x=x;obj.y=y;el.style.left=(x/W*100)+"%";el.style.top=(y/h*100)+"%";}function up(){if(timer)clearTimeout(timer);el.removeEventListener("pointermove",move);el.removeEventListener("pointerup",up);el.removeEventListener("pointercancel",up);if(moved&&!longFired)saveState();}el.addEventListener("pointermove",move);el.addEventListener("pointerup",up);el.addEventListener("pointercancel",up);}
  function openInlineInput(anchorEl,prefill,onCommit){const wrapRect=pitchWrap.getBoundingClientRect(),aRect=anchorEl.getBoundingClientRect(),input=document.createElement("input");input.className="overlayInput";input.value=prefill||"";input.style.left=(aRect.left-wrapRect.left+aRect.width/2)+"px";input.style.top=(aRect.top-wrapRect.top+aRect.height/2)+"px";pitchWrap.appendChild(input);input.focus();input.select();let done=false;function commit(){if(done)return;done=true;onCommit(input.value);input.remove();}input.addEventListener("keydown",ev=>{if(ev.key==="Enter"){ev.preventDefault();commit();}if(ev.key==="Escape"){done=true;input.remove();}});input.addEventListener("blur",commit);}
  function fitCanvas(){const rect=pitchWrap.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.max(1,Math.round(rect.width*dpr));canvas.height=Math.max(1,Math.round(rect.height*dpr));ctx.setTransform(dpr,0,0,dpr,0,0);}
  function m2px(x,y){const rect=pitchWrap.getBoundingClientRect(),h=curH();return[x/W*rect.width,y/h*rect.height];}function px2m(clientX,clientY){const rect=pitchWrap.getBoundingClientRect(),h=curH();return[(clientX-rect.left)/rect.width*W,(clientY-rect.top)/rect.height*h];}
  function drawArrow(x1,y1,x2,y2,color,dash){const p1=m2px(x1,y1),p2=m2px(x2,y2);ctx.setLineDash(dash?[9,7]:[]);ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=2.8;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(p1[0],p1[1]);ctx.lineTo(p2[0],p2[1]);ctx.stroke();ctx.setLineDash([]);const ang=Math.atan2(p2[1]-p1[1],p2[0]-p1[0]),head=12;ctx.beginPath();ctx.moveTo(p2[0],p2[1]);ctx.lineTo(p2[0]-head*Math.cos(ang-Math.PI/7),p2[1]-head*Math.sin(ang-Math.PI/7));ctx.lineTo(p2[0]-head*Math.cos(ang+Math.PI/7),p2[1]-head*Math.sin(ang+Math.PI/7));ctx.closePath();ctx.fill();}
  function drawPen(points,color){if(points.length<2)return;ctx.setLineDash([]);ctx.strokeStyle=color;ctx.lineWidth=2.8;ctx.lineCap="round";ctx.lineJoin="round";const first=m2px(points[0].x,points[0].y);ctx.beginPath();ctx.moveTo(first[0],first[1]);for(let i=1;i<points.length;i++){const p=m2px(points[i].x,points[i].y);ctx.lineTo(p[0],p[1]);}ctx.stroke();}
  function drawText(x,y,text,color){const p=m2px(x,y);ctx.font="700 14px -apple-system,Helvetica,Arial,sans-serif";const pad=6,width=ctx.measureText(text).width;ctx.fillStyle="rgba(0,0,0,.58)";ctx.fillRect(p[0]-2,p[1]-15,width+pad*2,20);ctx.fillStyle=color;ctx.fillText(text,p[0]+pad-2,p[1]);}

  function distPointToSegment(px,py,x1,y1,x2,y2){const vx=x2-x1,vy=y2-y1,wx=px-x1,wy=py-y1;const c1=vx*wx+vy*wy;if(c1<=0)return Math.hypot(px-x1,py-y1);const c2=vx*vx+vy*vy;if(c2<=c1)return Math.hypot(px-x2,py-y2);const b=c1/c2;return Math.hypot(px-(x1+b*vx),py-(y1+b*vy));}
  function drawingDistance(d,x,y){if(d.type==="arrow")return distPointToSegment(x,y,d.x1,d.y1,d.x2,d.y2);if(d.type==="pen"){let best=999;for(let i=1;i<d.points.length;i++){best=Math.min(best,distPointToSegment(x,y,d.points[i-1].x,d.points[i-1].y,d.points[i].x,d.points[i].y));}return best;}if(d.type==="text")return Math.hypot(x-d.x,y-d.y);return 999;}
  function eraseAt(x,y){const s=curState();const drawings=s.drawings||[];const threshold=2.8;for(let i=drawings.length-1;i>=0;i--){if(drawingDistance(drawings[i],x,y)<=threshold){drawings.splice(i,1);redrawCanvas();saveState();return true;}}return false;}
  function redrawCanvas(extra){fitCanvas();ctx.clearRect(0,0,canvas.width,canvas.height);const drawings=curState().drawings||[];drawings.forEach(d=>{if(d.type==="arrow")drawArrow(d.x1,d.y1,d.x2,d.y2,d.color,d.dash);else if(d.type==="pen")drawPen(d.points,d.color);else if(d.type==="text")drawText(d.x,d.y,d.text,d.color);});if(extra){if(extra.type==="arrow")drawArrow(extra.x1,extra.y1,extra.x2,extra.y2,extra.color,extra.dash);else if(extra.type==="pen")drawPen(extra.points,extra.color);}}
  let drawing=null,erasing=false;pitchWrap.addEventListener("pointerdown",e=>{if(state.tool==="move"||state.tool==="rotate")return;e.preventDefault();const p=px2m(e.clientX,e.clientY),x=p[0],y=p[1];if(state.tool==="text"){openTextInput(e.clientX,e.clientY,x,y);return;}try{pitchWrap.setPointerCapture(e.pointerId);}catch(err){}if(state.tool==="eraser"){erasing=true;eraseAt(x,y);return;}if(state.tool==="arrow")drawing={type:"arrow",x1:x,y1:y,x2:x,y2:y,color:state.color,dash:state.lineStyle==="dash"};else if(state.tool==="pen")drawing={type:"pen",points:[{x,y}],color:state.color};});pitchWrap.addEventListener("pointermove",e=>{const p=px2m(e.clientX,e.clientY),x=p[0],y=p[1];if(erasing){eraseAt(x,y);return;}if(!drawing)return;if(drawing.type==="arrow"){drawing.x2=x;drawing.y2=y;}else if(drawing.type==="pen")drawing.points.push({x,y});redrawCanvas(drawing);});function endDraw(){if(erasing){erasing=false;return;}if(!drawing)return;curState().drawings.push(drawing);drawing=null;redrawCanvas();saveState();}pitchWrap.addEventListener("pointerup",endDraw);pitchWrap.addEventListener("pointercancel",endDraw);
  function openTextInput(clientX,clientY,mx,my){const rect=pitchWrap.getBoundingClientRect(),input=document.createElement("input");input.className="overlayInput";input.placeholder="メモ";input.style.left=(clientX-rect.left)+"px";input.style.top=(clientY-rect.top)+"px";pitchWrap.appendChild(input);input.focus();let done=false;function commit(){if(done)return;done=true;const val=input.value.trim();if(val)curState().drawings.push({type:"text",x:mx,y:my,text:val,color:state.color});input.remove();redrawCanvas();saveState();}input.addEventListener("keydown",ev=>{if(ev.key==="Enter"){ev.preventDefault();commit();}if(ev.key==="Escape"){done=true;input.remove();}});input.addEventListener("blur",commit);}
  document.getElementById("modeSeg").addEventListener("click",e=>{const btn=e.target.closest("button[data-mode]");if(!btn)return;document.querySelectorAll("#modeSeg button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");state.mode=btn.dataset.mode;refreshPresetUI();buildPitchSVG();renderTokens();redrawCanvas();saveState();});
  document.getElementById("toolRow").addEventListener("click",e=>{const btn=e.target.closest("button[data-tool]");if(!btn)return;document.querySelectorAll("#toolRow button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");state.tool=btn.dataset.tool;tokensEl.style.pointerEvents=(state.tool==="move"||state.tool==="rotate")?"auto":"none";});
  document.getElementById("swatchRow").addEventListener("click",e=>{const btn=e.target.closest("button[data-color]");if(!btn)return;document.querySelectorAll(".swatch").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");state.color=btn.dataset.color;saveState();});
  document.getElementById("dashSeg").addEventListener("click",e=>{const btn=e.target.closest("button[data-dash]");if(!btn)return;document.querySelectorAll("#dashSeg button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");state.lineStyle=btn.dataset.dash;saveState();});
  document.getElementById("undoBtn").addEventListener("click",()=>{curState().drawings.pop();redrawCanvas();saveState();});document.getElementById("clearBtn").addEventListener("click",()=>{curState().drawings=[];redrawCanvas();saveState();});document.getElementById("resetBtn").addEventListener("click",()=>{if(state.mode==="full"){const f=makeFullFormation(state.full.homePreset,state.full.awayPreset);state.full.players=f.players;state.full.ball=f.ball;}else{const f=makeHalfFormation(state.half.preset);state.half.players=f.players;state.half.ball=f.ball;}renderTokens();redrawCanvas();saveState();});
  document.getElementById("flipBtn").addEventListener("click",()=>{const h=curH(),s=curState();s.players.forEach(p=>{p.y=h-p.y;p.angle=(180-(p.angle||0)+360)%360;});s.ball.y=h-s.ball.y;s.drawings.forEach(d=>{if(d.type==="arrow"){d.y1=h-d.y1;d.y2=h-d.y2;}else if(d.type==="pen")d.points.forEach(pt=>pt.y=h-pt.y);else if(d.type==="text")d.y=h-d.y;});renderTokens();redrawCanvas();saveState();});
  const blueInput=document.getElementById("blueLabelInput"),redInput=document.getElementById("redLabelInput");blueInput.value=state.teamLabels.blue||"BLUE";redInput.value=state.teamLabels.red||"RED";blueInput.addEventListener("input",()=>{state.teamLabels.blue=blueInput.value;saveState();});redInput.addEventListener("input",()=>{state.teamLabels.red=redInput.value;saveState();});
  function syncButtons(){document.querySelectorAll("#modeSeg button").forEach(b=>b.classList.toggle("active",b.dataset.mode===state.mode));document.querySelectorAll("#toolRow button").forEach(b=>b.classList.toggle("active",b.dataset.tool===state.tool));document.querySelectorAll(".swatch").forEach(b=>b.classList.toggle("selected",b.dataset.color===state.color));document.querySelectorAll("#dashSeg button").forEach(b=>b.classList.toggle("active",b.dataset.dash===state.lineStyle));}
  function handleResize(){updatePitchHeight();redrawCanvas();}
  refreshPresetUI();syncButtons();buildPitchSVG();renderTokens();redrawCanvas();window.addEventListener("resize",handleResize);window.addEventListener("orientationchange",handleResize);try{if(typeof ResizeObserver!=="undefined")new ResizeObserver(handleResize).observe(pitchWrap);}catch(e){}
})();
</script>
